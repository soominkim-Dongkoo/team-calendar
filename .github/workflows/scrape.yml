name: Scrape Leave Records

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python packages
        run: pip install playwright supabase python-dotenv requests

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (캐시 히트 시)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run scraper
        env:
          DAOU_URL: ${{ secrets.DAOU_URL }}
          DAOU_ID: ${{ secrets.DAOU_ID }}
          DAOU_PW: ${{ secrets.DAOU_PW }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper/scrape.py

      - name: Send reminders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
        run: python scraper/notify.py
